# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go
permissions:
  contents: read

on:
  push:
    branches:
      - v0
  pull_request:
    branches:
      - v0 

jobs:

  build:
    runs-on: ubuntu-latest
    container:
      image: golang:1.23

    steps:
    - uses: actions/checkout@v4

    - name: List
      run: |
        ls -l /__w/task-cli
        ls -l /__w/task-cli/task-cli


    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
